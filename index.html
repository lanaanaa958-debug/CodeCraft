<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CodeCraft SMAN 1 KRADENAN | Digital Innovation Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-dark: #020617; --accent-cyan: #22d3ee; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #e2e8f0; overflow-x: hidden; width: 100%; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-cyan { box-shadow: 0 0 30px rgba(6, 182, 212, 0.2); }
        .glow-amber { box-shadow: 0 0 40px rgba(245, 158, 11, 0.15); }
        .hero-title { font-size: clamp(2.5rem, 10vw, 7rem); line-height: 0.9; letter-spacing: -0.05em; }
        .gradient-text { background: linear-gradient(to right, #22d3ee, #3b82f6, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .max-w-screen { max-width: 100vw; overflow-x: hidden; }
        @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .animate-floating { animation: floating 6s ease-in-out infinite; }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.1); } }
        .animate-pulse-slow { animation: pulse-slow 10s infinite ease-in-out; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="max-w-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const firebaseConfig = {
            apiKey: "AIzaSyCb03fkh-5y6kWfjAvoVrwzhSW5dbb6QXY",
            authDomain: "vcode-9ebcf.firebaseapp.com",
            projectId: "vcode-9ebcf",
            storageBucket: "vcode-9ebcf.firebasestorage.app",
            messagingSenderId: "448989915791",
            appId: "1:448989915791:web:0930e6ec0d38a074ebdefa",
            measurementId: "G-X1ZFMQG1PP"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: {
                            width: size,
                            height: size,
                            class: className
                        }
                    });
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [mobileMenu, setMobileMenu] = useState(false);
            
            // State Form Ruang Ide
            const [ideaData, setIdeaData] = useState({ sender: '', description: '' });
            const [ideaStatus, setIdeaStatus] = useState('idle');
            
            // State Database
            const [projects, setProjects] = useState([]);
            const [activities, setActivities] = useState([]);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                
                // Fetch Projects secara realtime dari Firestore
                const unsubProjects = db.collection('projects').onSnapshot(snapshot => {
                    const projData = [];
                    snapshot.forEach(doc => projData.push({ id: doc.id, ...doc.data() }));
                    setProjects(projData);
                });

                // Fetch Gallery secara realtime dari Firestore
                const unsubGallery = db.collection('gallery').onSnapshot(snapshot => {
                    const galData = [];
                    snapshot.forEach(doc => galData.push({ id: doc.id, ...doc.data() }));
                    setActivities(galData);
                });

                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    unsubProjects();
                    unsubGallery();
                };
            }, []);

            const handleIdeaSubmit = async (e) => {
                e.preventDefault();
                setIdeaStatus('loading');
                try {
                    await db.collection('ideas').add({ 
                        ...ideaData, 
                        status: 'pending',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp() 
                    });
                    setIdeaStatus('success');
                    setTimeout(() => { 
                        setIdeaStatus('idle'); 
                        setIdeaData({ sender: '', description: '' }); 
                    }, 3000);
                } catch (err) { 
                    console.error("Gagal mengirim ide:", err);
                    setIdeaStatus('error');
                    setTimeout(() => setIdeaStatus('idle'), 3000);
                }
            };

            return (
                <div className="min-h-screen relative bg-[#020617]">
                    
                    {/* NAVBAR */}
                    <nav className={`fixed top-0 w-full z-[100] transition-all duration-700 ${isScrolled ? 'py-4 bg-[#020617]/90 backdrop-blur-2xl border-b border-white/5' : 'py-8 bg-transparent'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <motion.div initial={{ opacity: 0, x: -20 }} animate={{ opacity: 1, x: 0 }} className="flex items-center gap-3 group cursor-pointer">
                                <div className="p-2 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-xl glow-cyan group-hover:rotate-12 transition-transform shadow-lg">
                                    <Icon name="terminal" size={22} className="text-white" />
                                </div>
                                <span className="text-2xl font-bold tracking-tighter text-white">Code<span className="text-cyan-400">Craft</span></span>
                            </motion.div>
                            
                            <div className="hidden md:flex gap-10 text-[11px] font-bold uppercase tracking-[0.25em] text-white/60">
                                {['Home', 'Products', 'Ruang Ide', 'Activities'].map(item => (
                                    <a key={item} href={`#${item.toLowerCase().replace(' ', '-')}`} className="hover:text-cyan-400 transition-all relative group">
                                        {item}
                                        <span className="absolute -bottom-1 left-0 w-0 h-0.5 bg-cyan-400 transition-all group-hover:w-full"></span>
                                    </a>
                                ))}
                            </div>

                            <button onClick={() => setMobileMenu(true)} className="md:hidden text-white p-2">
                                <Icon name="menu" size={28} />
                            </button>
                        </div>
                    </nav>

                    {/* MOBILE MENU */}
                    <AnimatePresence>
                        {mobileMenu && (
                            <motion.div initial={{ opacity: 0, x: '100%' }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: '100%' }} className="fixed inset-0 z-[110] bg-slate-950 flex flex-col items-center justify-center gap-10 md:hidden">
                                <button onClick={() => setMobileMenu(false)} className="absolute top-8 right-8 text-white"><Icon name="x" size={40} /></button>
                                {['Home', 'Products', 'Ruang Ide', 'Activities'].map(item => (
                                    <a key={item} onClick={() => setMobileMenu(false)} href={`#${item.toLowerCase().replace(' ', '-')}`} className="text-4xl font-black text-white uppercase tracking-tighter hover:text-cyan-400 transition-colors">{item}</a>
                                ))}
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* HEADER / HERO SECTION */}
                    <section id="home" className="pt-48 pb-32 px-6 relative overflow-hidden flex flex-col items-center justify-center min-h-screen">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full -z-10">
                            <div className="absolute top-[10%] left-[-10%] w-[60%] h-[60%] bg-cyan-500/10 blur-[120px] rounded-full animate-pulse-slow" />
                            <div className="absolute bottom-[10%] right-[-10%] w-[50%] h-[50%] bg-purple-600/10 blur-[120px] rounded-full animate-pulse-slow" />
                        </div>

                        <div className="max-w-7xl mx-auto text-center w-full relative">
                            <motion.div initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.8 }} className="inline-flex items-center gap-3 px-6 py-2 glass rounded-full text-[11px] font-bold tracking-[0.3em] text-cyan-400 uppercase mb-12 border border-cyan-500/20 shadow-2xl">
                                <Icon name="sparkles" size={16} /> Official SMAN 1 KRADENAN Club
                            </motion.div>
                            
                            <motion.h1 initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} transition={{ duration: 1, delay: 0.2 }} className="hero-title font-black text-white uppercase mb-12 leading-none">
                                Crafting The Future,<br/>
                                <span className="gradient-text">One Line At A Time.</span>
                            </motion.h1>

                            <motion.p initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ duration: 1, delay: 0.5 }} className="text-xl md:text-2xl text-slate-400 mb-16 max-w-3xl mx-auto font-medium leading-relaxed">
                                Eksplorasi kreativitas tanpa batas di <span className="text-white font-bold">SMAN 1 KRADENAN</span>. Kami membangun game edukasi, aplikasi web, dan solusi digital masa depan.
                            </motion.p>

                            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.8, delay: 0.8 }} className="flex flex-col sm:flex-row justify-center gap-6">
                                <a href="#products" className="px-10 py-5 bg-cyan-600 hover:bg-cyan-500 text-white rounded-2xl font-black transition-all shadow-[0_10px_40px_rgba(6,182,212,0.3)] flex items-center justify-center gap-3 active:scale-95 text-xs uppercase tracking-[0.2em]">
                                    Lihat Produk <Icon name="arrow-right" size={20} />
                                </a>
                                <a href="#ruang-ide" className="px-10 py-5 glass hover:bg-white/10 text-white rounded-2xl font-black transition-all active:scale-95 text-xs uppercase tracking-[0.2em] flex items-center justify-center gap-3">
                                    Kirim Ide Project <Icon name="lightbulb" size={20} className="text-amber-400" />
                                </a>
                            </motion.div>
                        </div>
                    </section>

                    {/* PRODUCTS SECTION */}
                    <section id="products" className="py-32 px-6 bg-slate-950/40 relative">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-24 gap-10">
                                <motion.div initial={{ opacity: 0, x: -30 }} whileInView={{ opacity: 1, x: 0 }} viewport={{ once: true }}>
                                    <h2 className="text-5xl md:text-8xl font-black tracking-tighter uppercase text-white leading-none mb-6">Showcase Produk</h2>
                                    <div className="w-32 h-2 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-full" />
                                </motion.div>
                                <p className="text-slate-500 max-w-sm text-xs font-bold uppercase tracking-[0.3em] leading-loose">Koleksi aplikasi dan game karya inovatif tim koding CodeCraft.</p>
                            </div>

                            {projects.length === 0 ? (
                                <div className="text-center py-20 border border-dashed border-white/10 rounded-[3rem] glass">
                                    <Icon name="code" size={48} className="mx-auto text-slate-600 mb-4" />
                                    <p className="text-slate-400 font-medium">Belum ada project yang dipublikasikan oleh Admin.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                                    {projects.map((p, idx) => (
                                        <motion.div 
                                            key={p.id} 
                                            initial={{ opacity: 0, y: 30 }} 
                                            whileInView={{ opacity: 1, y: 0 }} 
                                            viewport={{ once: true }} 
                                            transition={{ delay: idx * 0.1 }}
                                            whileHover={{ y: -12 }}
                                            className="glass p-8 rounded-[3rem] flex flex-col h-full group relative overflow-hidden transition-all duration-500 hover:border-cyan-500/40 shadow-2xl"
                                        >
                                            {p.thumbnail ? (
                                                <img src={p.thumbnail} alt={p.title} className="w-full h-40 object-cover rounded-[1.5rem] mb-6 shadow-lg group-hover:scale-105 transition-transform duration-500" />
                                            ) : (
                                                <div className={`w-16 h-16 rounded-[1.5rem] bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center mb-8 shadow-xl group-hover:scale-110 group-hover:rotate-6 transition-all`}>
                                                    <Icon name="folder-code" size={28} className="text-white" />
                                                </div>
                                            )}
                                            
                                            <h3 className="text-2xl font-extrabold mb-2 text-white group-hover:text-cyan-400 transition-colors">{p.title}</h3>
                                            
                                            {/* BARU: Tampilan Nama Developer dari Dashboard */}
                                            <div className="flex items-center gap-2 mb-4 text-[10px] font-bold text-cyan-400/80 uppercase tracking-widest bg-cyan-500/10 w-fit px-3 py-1 rounded-full border border-cyan-500/20">
                                                <Icon name="user" size={12} />
                                                <span>{p.developer || p.devName || 'Tim CodeCraft'}</span>
                                            </div>

                                            <p className="text-sm text-slate-400 mb-8 flex-grow leading-relaxed font-medium line-clamp-3">{p.desc}</p>
                                            
                                            <div className="flex justify-between items-center mt-auto pt-6 border-t border-white/5">
                                                <div className="flex gap-1.5 items-center">
                                                    <div className="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></div>
                                                    <span className="text-[9px] font-black text-slate-500 tracking-widest uppercase">Live</span>
                                                </div>
                                                <a href={p.demoUrl} target="_blank" className="w-12 h-12 flex items-center justify-center bg-white/5 hover:bg-cyan-600 text-white rounded-2xl transition-all shadow-inner"><Icon name="external-link" size={20} /></a>
                                            </div>
                                        </motion.div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </section>

                    {/* RUANG IDE SECTION */}
                    <section id="ruang-ide" className="py-32 px-6 relative overflow-hidden bg-gradient-to-b from-slate-950/40 to-[#020617]">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-amber-500/5 blur-[150px] -z-10 rounded-full"></div>
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-24 items-center">
                            <motion.div initial={{ opacity: 0, x: -50 }} whileInView={{ opacity: 1, x: 0 }} viewport={{ once: true }} className="space-y-10">
                                <div className="w-20 h-20 bg-amber-500/10 rounded-3xl flex items-center justify-center glow-amber border border-amber-500/20 animate-floating">
                                    <Icon name="lightbulb" size={40} className="text-amber-400" />
                                </div>
                                <h2 className="text-6xl md:text-8xl font-black tracking-tighter uppercase text-white leading-[0.85]">Ruang Ide<br/><span className="text-amber-500">Aspirasi.</span></h2>
                                <p className="text-slate-400 text-xl leading-relaxed font-medium max-w-lg">Punya konsep gila untuk project selanjutnya? Bagikan inspirasimu dan tim koding akan mewujudkannya menjadi kenyataan.</p>
                            </motion.div>
                            
                            <motion.div initial={{ opacity: 0, scale: 0.95 }} whileInView={{ opacity: 1, scale: 1 }} viewport={{ once: true }} className="glass p-10 md:p-14 rounded-[4rem] border-white/10 shadow-[0_30px_100px_rgba(0,0,0,0.5)] relative overflow-hidden">
                                <form onSubmit={handleIdeaSubmit} className="space-y-8 relative z-10">
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] ml-2">Nama / Kelas Pengirim</label>
                                        <input required value={ideaData.sender} onChange={e => setIdeaData({...ideaData, sender: e.target.value})} type="text" placeholder="Contoh: Andi / XI-RPL" className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white outline-none focus:ring-2 focus:ring-amber-500/50 focus:bg-white/10 transition-all font-medium" />
                                    </div>
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] ml-2">Detail Konsep Ide</label>
                                        <textarea required value={ideaData.description} onChange={e => setIdeaData({...ideaData, description: e.target.value})} placeholder="Jelaskan bagaimana project ini bekerja..." className="w-full h-40 bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white outline-none focus:ring-2 focus:ring-amber-500/50 focus:bg-white/10 transition-all resize-none font-medium" />
                                    </div>
                                    <button disabled={ideaStatus !== 'idle'} className={`w-full py-6 rounded-2xl font-black flex items-center justify-center gap-4 ${ideaStatus === 'success' ? 'bg-emerald-600' : ideaStatus === 'error' ? 'bg-red-600' : 'bg-amber-600 hover:bg-amber-500'} text-white uppercase tracking-[0.25em] text-xs transition-all active:scale-95`}>
                                        {ideaStatus === 'idle' ? 'Tanamkan Ide' : ideaStatus === 'loading' ? 'Memproses...' : ideaStatus === 'error' ? 'Gagal Terkirim' : 'Ide Berhasil Dikirim!'}
                                        {ideaStatus === 'idle' && <Icon name="send" size={18} />}
                                    </button>
                                </form>
                            </motion.div>
                        </div>
                    </section>

                    {/* ACTIVITIES SECTION */}
                    <section id="activities" className="py-32 px-6">
                        <div className="max-w-7xl mx-auto">
                            <motion.div initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} className="text-center mb-24 space-y-6">
                                <h2 className="text-5xl md:text-8xl font-black tracking-tighter uppercase text-white">Galeri Kegiatan</h2>
                                <div className="flex justify-center"><div className="w-24 h-1.5 bg-cyan-600 rounded-full" /></div>
                            </motion.div>

                            {activities.length === 0 ? (
                                <div className="text-center py-20 border border-dashed border-white/10 rounded-[3rem] glass">
                                    <Icon name="image" size={48} className="mx-auto text-slate-600 mb-4" />
                                    <p className="text-slate-400 font-medium">Belum ada foto galeri kegiatan yang dipublikasikan.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                    {activities.map((act, idx) => (
                                        <motion.div 
                                            key={act.id} 
                                            initial={{ opacity: 0, scale: 0.9 }} 
                                            whileInView={{ opacity: 1, scale: 1 }} 
                                            viewport={{ once: true }} 
                                            transition={{ delay: idx * 0.1 }}
                                            className={`relative rounded-[3rem] overflow-hidden group shadow-3xl h-64 md:h-80 ${idx === 0 ? 'md:col-span-2 md:row-span-2 h-96 md:h-full' : ''}`}
                                        >
                                            <img src={act.photoUrl} className="w-full h-full object-cover grayscale transition-all duration-[1.5s] group-hover:grayscale-0 group-hover:scale-110" alt={act.caption} />
                                            <div className="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-transparent p-10 flex flex-col justify-end translate-y-6 group-hover:translate-y-0 transition-all duration-700">
                                                <span className="text-[10px] font-black text-cyan-400 uppercase tracking-[0.4em] mb-3 opacity-0 group-hover:opacity-100 transition-opacity">Dokumentasi</span>
                                                <h4 className="text-xl md:text-2xl font-black text-white mb-2 uppercase tracking-tighter">{act.caption}</h4>
                                            </div>
                                        </motion.div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer className="py-24 border-t border-white/5 text-center px-6 bg-[#01040f]">
                        <div className="max-w-7xl mx-auto">
                            <motion.div initial={{ opacity: 0 }} whileInView={{ opacity: 1 }} viewport={{ once: true }} className="flex flex-col items-center gap-10">
                                <div className="flex items-center gap-3">
                                    <div className="p-3 bg-gradient-to-br from-cyan-600 to-blue-700 rounded-2xl shadow-xl"><Icon name="terminal" size={28} className="text-white" /></div>
                                    <span className="text-3xl font-black text-white tracking-tighter uppercase">CodeCraft</span>
                                </div>
                                <p className="text-slate-600 text-[11px] tracking-[0.5em] uppercase font-black leading-loose">
                                    © 2024 SMAN 1 KRADENAN DIGITAL SECTOR.<br />
                                    ENGINEERED WITH PASSION BY INNOVATORS.
                                </p>
                            </motion.div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
